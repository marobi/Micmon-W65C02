MEMORY {

    ZP:     start = $00C0, size = $0040, type = rw;
    SRAM:   start = $0100, size = $0100, type = rw;
    URAM:   start = $0200, size = $0E00, type = rw;

    ROM:    start = $E000, size = $1000, type = ro, file = %O;

    VECT:   start = $FFFA, size = $0006, type = rw;
}

SEGMENTS {

    ZEROPAGE:   load = ZP,   type = zp;
    DATA:       load = SRAM, type = rw;
    BSS:        load = URAM, type = bss;

    CODE:       load = ROM,  type = ro;

    VECTORS:    load = VECT, type = bss;
}
